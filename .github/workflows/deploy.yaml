name: Deploy Quartz site to GitHub Pages
 
on:
  push:
    branches:
      - v4
 
permissions:
  contents: read
  pages: write
  id-token: write
 
concurrency:
  group: "pages"
  cancel-in-progress: false
 
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for git info
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Dependencies
        run: npm ci
      - name: Build Quartz
        run: npx quartz build
        # ⭐ NEW: Install PageCrypt
      - name: Install PageCrypt
        run: npm install pagecrypt

      - name: Encrypt index.html with PageCrypt
        env:
          QUARTZ_PASSWORD: ${{ secrets.QUARTZ_PASSWORD }}
        run: |
          if [ -z "$QUARTZ_PASSWORD" ]; then
            echo "❌ QUARTZ_PASSWORD secret is not set"
            exit 1
          fi
          echo "🔐 Encrypting public/index.html..."
          npx pagecrypt public/index.html public/index.html "$QUARTZ_PASSWORD"
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public
 
  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
